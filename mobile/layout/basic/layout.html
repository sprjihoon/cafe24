<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=yes">
    <meta name="format-detection" content="telephone=no">
    <title></title>

    <!--@css(/layout/basic/css/ec-base-tab.css)-->

<!--@js(/layout/basic/js/common.js)-->
<!--@js(/layout/basic/js/basic.js)-->

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
</head>
<body id="layout">
<div id="wrap">
    <!--@import(/layout/basic/sidebar.html)-->
    <hr class="layout">
    <div id="container">

        <!-- ATELIER N 모바일 헤더 -->
        <header id="header">
            <div class="header lb-m-header lb-m-header--main">
                <!-- 좌: 햄버거 -->
                <button type="button" class="lb-m-header__hamburger fold" aria-label="메뉴 열기">
                    <span></span><span></span><span></span>
                </button>

                <!-- 중: 로고 -->
                <h1 class="lb-m-header__logo" module="Layout_LogoTop">
                    <!--@css(/css/module/layout/logotop.css)-->
                    <a href="/index.html">
                        <span class="lb-logo-brand">{$mall_name}</span>
                        <span class="lb-logo-tagline">ATELIER N.</span>
                    </a>
                </h1>

                <!-- 우: 아이콘 -->
                <div class="lb-m-header__utils">
                    <button type="button" class="lb-m-header__icon lb-m-search-trigger" aria-label="검색">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </button>
                    <p class="lb-m-header__basket" module="Layout_orderBasketcount">
                        <a href="/order/basket.html" class="lb-m-header__icon" aria-label="장바구니">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                            <span class="lb-m-basket-count {$basket_count_display|display} {$basket_count_display_class}"><span class="{$basket_count_class}">{$basket_count}</span></span>
                        </a>
                    </p>
                </div>

                <!-- Cafe24 필수: 검색 패널 (숨김 — JS로 트리거) -->
                <section id="topArea" style="display:none;">
                    <div class="searchWrap">
                        <p class="category"><a href="#none" class="fold">카테고리</a></p>
                        <p class="search"><button type="button" id="lb-search-open">검색</button></p>
                    </div>
                </section>
                <!--@import(/layout/basic/search.html)-->
            </div>
        </header>

        <!-- 헤더 하단 카테고리 탭바 + ▼ 전체메뉴 래퍼 -->
        <div class="lb-m-catbar-wrap" id="lb-m-catbar-wrap">
            <!-- Cafe24 필수 구조: Layout_MobileMaincategory (숨김, 탭바는 아래 커스텀 목록 사용) -->
            <nav style="display:none;" module="Layout_MobileMaincategory">
                <ul><li module="Mobile_Categoryname_1" data-seq="{$display_group}"><a href="#none">{$category_name}</a></li></ul>
            </nav>

            <!-- 커스텀 카테고리 탭바 (가로 스와이프) -->
            <nav class="lb-m-catbar" id="lb-m-catbar" aria-label="카테고리 메뉴">
                <ul class="lb-m-catbar__list">
                    <li><a href="/m/product/list.html?cate_no=23">SHOP ALL</a></li>
                    <li><a href="/m/product/list.html?cate_no=25">TOPS</a></li>
                    <li><a href="/m/product/list.html?cate_no=32">KNIT</a></li>
                    <li><a href="/m/product/list.html?cate_no=33">BLOUSE</a></li>
                    <li><a href="/m/product/list.html?cate_no=34">T-SHIRT</a></li>
                    <li><a href="/m/product/list.html?cate_no=26">DRESSES</a></li>
                    <li><a href="/m/product/list.html?cate_no=24">OUTERWEAR</a></li>
                    <li><a href="/m/product/list.html?cate_no=27">BOTTOMS</a></li>
                    <li><a href="/m/product/list.html?cate_no=28">BAG &amp; SHOES</a></li>
                </ul>
            </nav>

            <!-- ▼ 전체메뉴 버튼 (우측 고정) -->
            <button type="button" class="lb-m-catbar__more" id="lb-m-catbar-more" aria-label="전체메뉴" aria-expanded="false">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
        </div>

        <!-- ▼ 전체메뉴 드롭다운 패널 -->
        <div class="lb-m-catdrop" id="lb-m-catdrop" aria-hidden="true">
            <div class="lb-m-catdrop__inner">
                <a href="/m/product/list.html?cate_no=23" class="lb-m-catdrop__link">SHOP ALL</a>
                <a href="/m/product/list.html?cate_no=25" class="lb-m-catdrop__link">TOPS</a>
                <a href="/m/product/list.html?cate_no=32" class="lb-m-catdrop__link">KNIT</a>
                <a href="/m/product/list.html?cate_no=33" class="lb-m-catdrop__link">BLOUSE</a>
                <a href="/m/product/list.html?cate_no=34" class="lb-m-catdrop__link">T-SHIRT</a>
                <a href="/m/product/list.html?cate_no=26" class="lb-m-catdrop__link">DRESSES</a>
                <a href="/m/product/list.html?cate_no=24" class="lb-m-catdrop__link">OUTERWEAR</a>
                <a href="/m/product/list.html?cate_no=27" class="lb-m-catdrop__link">BOTTOMS</a>
                <a href="/m/product/list.html?cate_no=28" class="lb-m-catdrop__link">BAG &amp; SHOES</a>
            </div>
            <div class="lb-m-catdrop__backdrop" id="lb-m-catdrop-backdrop"></div>
        </div>

        <hr class="layout">
        <!-- 마르키(36px)는 일반흐름, 헤더(52px)+탭바(38px)=90px 보정 -->
        <div class="lb-fixed-spacer" style="display:block;height:90px;width:100%;flex-shrink:0;min-height:90px;"></div>
        <div id="contents">
            <!--@contents-->
        </div>
        <hr class="layout">
        <!--@import(/layout/basic/footer.html)-->
    </div>
</div>

<!-- 하단 탭 네비게이션 -->
<nav class="lb-m-tabnav" aria-label="하단 네비게이션">
    <a href="/" class="lb-m-tabnav__item" data-tab="home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>홈</span>
    </a>
    <button type="button" class="lb-m-tabnav__item fold" data-tab="category">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>카테고리</span>
    </button>
    <button type="button" class="lb-m-tabnav__item lb-m-search-trigger" data-tab="search">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>검색</span>
    </button>
    <a href="/myshop/index.html" class="lb-m-tabnav__item" data-tab="mypage">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>마이</span>
    </a>
    <a href="/order/basket.html" class="lb-m-tabnav__item lb-m-tabnav__basket" data-tab="basket">
        <span class="lb-m-tabnav__badge-wrap">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            <span class="lb-m-tabnav__badge" id="lb-tab-basket-count" style="display:none;"></span>
        </span>
        <span>장바구니</span>
    </a>
</nav>

<script>
(function(){
    /* 검색 트리거 */
    document.querySelectorAll('.lb-m-search-trigger').forEach(function(btn){
        btn.addEventListener('click', function(){
            var searchBtn = document.getElementById('lb-search-open');
            if(searchBtn) searchBtn.click();
        });
    });

    /* 장바구니 뱃지: 헤더 모듈에서 카운트 복사 */
    var headerBadge = document.querySelector('.lb-m-basket-count');
    var tabBadge = document.getElementById('lb-tab-basket-count');
    if(headerBadge && tabBadge) {
        var count = headerBadge.innerText.trim();
        if(count && count !== '0') {
            tabBadge.textContent = count;
            tabBadge.style.display = '';
        }
    }

    /* 탭 활성 표시 */
    var path = location.pathname;
    var active = 'home';
    if(path.indexOf('/myshop') === 0) active = 'mypage';
    else if(path.indexOf('/order/basket') >= 0) active = 'basket';
    var el = document.querySelector('.lb-m-tabnav__item[data-tab="' + active + '"]');
    if(el) el.classList.add('is-active');
})();
</script>
</body>
</html>
